<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Laptop Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background-color: #f5f5f5; }
        .card { margin-top: 50px; padding: 20px; border-radius: 15px; }
        img { height: 300px; object-fit: cover; }
        .price { color: green; font-size: 24px; font-weight: bold; }
    </style>
</head>

<body>
<div class="container">
    <div class="card shadow">
        <div class="row">

            <div class="col-md-6 text-center">
                <img th:src="@{${image}}" class="img-fluid" alt="Laptop Image">
            </div>

            <div class="col-md-6">
                <h2 th:text="${name}"></h2>

                <p><b>Processor:</b> <span th:text="${processor}"></span></p>
                <p><b>RAM:</b> <span th:text="${ram}"></span></p>
                <p><b>Graphics:</b> <span th:text="${graphics}"></span></p>

                <!-- Price -->
                <p class="price">
                    <b>Price:</b> ₹<span th:text="${#numbers.formatDecimal(price,0,'COMMA',0,'POINT')}"></span>
                </p>

                <a th:href="@{/checkout(id=${id}, price=${price}, name=${name})}" class="btn btn-success btn-lg">
                    Buy Now
                </a>

                <br><br>
                <a href="/" class="btn btn-secondary">Back</a>
            </div>

        </div>
    </div>
</div>
</body>
</html>
