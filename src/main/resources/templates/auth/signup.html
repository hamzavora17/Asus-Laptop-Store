<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Sign Up</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Bootstrap 5 CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: #f4f6f9;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.signup-card {
    background: #ffffff;
    border-radius: 12px;
    padding: 35px;
    width: 100%;
    max-width: 450px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.form-control {
    border-radius: 8px;
    padding: 12px;
}

.error-text {
    color: red;
    font-size: 0.85rem;
}
</style>
</head>

<body>

<div class="signup-card">

    <div class="text-center mb-4">
        <h3>Create Account</h3>
        <p>Fill the details to get started</p>
    </div>

    <!-- IMPORTANT PART -->
    <form th:action="@{/signup}" th:object="${user}" method="post">

        <!-- Username -->
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" th:field="*{username}" class="form-control" placeholder="Choose a username">
            <div class="error-text" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
        </div>

        <!-- Email -->
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" th:field="*{email}" class="form-control" placeholder="Enter email address">
            <div class="error-text" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>

        <!-- Password -->
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" th:field="*{password}" class="form-control" placeholder="Create password">
            <div class="error-text" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
        </div>

        <!-- Confirm Password (Optional – Backend Logic Required) -->
        <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input type="password" name="confirmPassword" class="form-control" placeholder="Confirm password">
        </div>

        <button type="submit" class="btn btn-primary w-100">
            Sign Up
        </button>

        <!-- SweetAlert2 CDN -->
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

        <p th:if="${error}" th:text="${error}" class="error-text text-center"></p>

        <p class="text-center mt-3">
            Already have an account?
            <a th:href="@{/login}">Login</a>
        </p>

		<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

		<script th:if="${param.success}">
		    Swal.fire({
		        title: "Success!",
		        text: "Signup successful 🎉",
		        icon: "success"
		    });
		</script>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
