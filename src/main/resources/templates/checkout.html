<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Checkout</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .checkout-card {
            max-width: 550px;
            margin: auto;
            margin-top: 40px;
            border-radius: 12px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.1);
        }

        .title {
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .product-box {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .btn-buy {
            background: #28a745;
            color: white;
            font-weight: bold;
        }

        .btn-buy:hover {
            background: #218838;
        }
    </style>

</head>

<body>

<div class="card checkout-card p-4">

    <h3 class="title">🛒 Checkout</h3>

    <!-- PRODUCT INFO -->
    <div class="product-box">
        <p><b>Laptop:</b> <span th:text="${name}"></span></p>
        <p><b>Price:</b> ₹<span th:text="${price}"></span></p>
        <p><b>Quantity:</b> <span th:text="${quantity}"></span></p>
        <p><b>Total:</b> ₹<span th:text="${totalPrice}"></span></p>
    </div>

    <!-- FORM -->
	<form action="/order" method="post">

	    <input type="hidden" name="price" th:value="${price}">
	    <input type="hidden" name="name" th:value="${name}">
	    <input type="hidden" name="quantity" th:value="${quantity}">

	    <label>Address</label>
	    <input type="text" name="address" class="form-control mb-3" required>

	    <label>Phone</label>
	    <input type="text" name="phone" class="form-control mb-3" required>

	    <label>Payment Method</label>
	    <select name="payment" class="form-control mb-3">
	        <option value="COD">Cash on Delivery</option>
	        <option value="UPI">UPI</option>
	    </select>

	    <button type="submit" class="btn btn-buy w-100">
	        Place Order
	    </button>

	</form>

    <a href="/index" class="btn btn-secondary w-100 mt-3">Back</a>

</div>

</body>
</html>
