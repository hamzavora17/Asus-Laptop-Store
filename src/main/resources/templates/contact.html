
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Contact Us - ASUS Store</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #f0f4ff, #e0f7fa);
            font-family: 'Poppins', sans-serif;
        }
        .contact-container {
            margin-top: 100px;
            margin-bottom: 50px;
        }
        .contact-info, .contact-form {
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .contact-info:hover, .contact-form:hover {
            transform: translateY(-5px);
        }
        .contact-info h5 {
            margin-bottom: 20px;
            color: #007bff;
        }
        .contact-info p {
            font-size: 15px;
            color: #555555;
        }
        .contact-form h5 {
            margin-bottom: 20px;
            color: #007bff;
        }
        .btn-primary {
            background: linear-gradient(to right, #007bff, #00bcd4);
            border: none;
        }
        .alert-success {
            margin-bottom: 20px;
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        input, textarea {
            border-radius: 10px;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold text-primary" href="/">ASUS Laptop Store</a>
        <div class="ms-auto">
			<a href="/" class="btn btn-outline-primary">Home</a>
        </div>
    </div>
</nav>

<!-- Contact Section -->
<div class="container contact-container">
    <div class="row g-4">
        
        <!-- Contact Info -->
        <div class="col-md-4">
            <div class="contact-info">
                <h5>Contact Information</h5>
                <p><i class="bi bi-geo-alt-fill"></i> 123, Laptop Street, Mumbai, India</p>
                <p><i class="bi bi-envelope-fill"></i> support@asusstore.com</p>
                <p><i class="bi bi-telephone-fill"></i> +91 9876543210</p>
            </div>
        </div>

        <!-- Contact Form -->
        <div class="col-md-8">
            <div class="contact-form">

                <h5>Send Us a Message</h5>

                <!-- Success Message -->
                <div th:if="${success}" class="alert alert-success text-center">
                    <p th:text="${success}"></p>
                </div>

                <form action="/contact" method="post">
                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mobile (Optional)</label>
                        <input type="text" name="phone" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Message</label>
                        <textarea name="message" class="form-control" rows="4" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Send Message</button>
                </form>

            </div>
        </div>
    </div>
</div>

</body>
</html>
