<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #eef3fb;
        }

        .title {
            text-align: center;
            font-weight: bold;
            margin: 20px 0;
            color: #0d6efd;
        }

        .card-box {
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0px 4px 15px rgba(13,110,253,0.2);
            text-align: center;
            background: white;
            border-left: 6px solid #0d6efd;
        }

        .section-title {
            margin-top: 30px;
            font-weight: bold;
            color: #0d6efd;
        }

        table {
            background: white;
        }

        .table thead {
            background: #0d6efd;
            color: white;
        }

        ul {
            list-style: none;
            padding-left: 0;
        }

        ul li {
            background: #ffffff;
            margin: 5px 0;
            padding: 8px;
            border-radius: 6px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.05);
        }
    </style>

</head>

<body>

<div class="container">

    <h1 class="title">📊 Admin Dashboard</h1>

    <!-- CARDS -->
    <div class="row">

        <div class="col-md-6">
            <div class="card-box">
                <h5>Total Orders</h5>
                <h3 th:text="${totalOrders}"></h3>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card-box">
                <h5>Total Revenue</h5>
                <h3>₹<span th:text="${totalRevenue}"></span></h3>
            </div>
        </div>

    </div>

    <!-- CUSTOMERS -->
    <h4 class="section-title">👥 Customers Who Purchased</h4>

    <div>
        <ul>
            <!-- ❌ NO UNKNOWN, NO NULL -->
            <li th:each="c : ${customerList}"
                th:if="${c != null and c != ''}"
                th:text="${c}">
            </li>
        </ul>
    </div>

    <!-- USERS TABLE -->
	<h4 class="text-center mb-4 fw-semibold" style="color:blue">Customer Records</h4>

	            <div class="table-responsive">
	                <table id="userTable" class="table table-striped table-bordered table-hover align-middle">
	                    <thead class="table-dark">
	                        <tr>
	                            <th>Id</th>
	                            <th>E-Mail</th>
	                            <th>Username</th>
	                            <th>Password</th>
	                            <th class="text-center">Actions</th>
	                        </tr>
	                    </thead>
	                    <tbody>
	                        <tr th:each="user : ${userList}">
	                            <td th:text="${user.id}"></td>
	                            <td th:text="${user.email}"></td>
	                            <td th:text="${user.username}"></td>
	                            <td th:text="${user.password}"></td>
	                            <td class="text-center">
	                                <a th:href="@{/userUpd/{id}(id=${user.id})}" 
	                                   class="btn btn-warning btn-sm me-2">
	                                   Edit
	                                </a>
	                                <a th:href="@{/deleteUser/{id}(id=${user.id})}" 
	                                   class="btn btn-danger btn-sm"
	                                   onclick="return confirm('Are you sure?')">
	                                   Delete
	                                </a>
	                            </td>
	                        </tr>
	                    </tbody>
	                </table>
	            </div>

</div>

</body>
</html>
