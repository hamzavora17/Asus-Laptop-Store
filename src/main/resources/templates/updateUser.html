<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Update User</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #ffffff;
            padding: 35px;
            width: 350px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #2c3e50;
        }

        label {
            font-weight: 600;
            color: #555;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            margin-bottom: 18px;
            border-radius: 6px;
            border: 1px solid #dcdcdc;
            transition: 0.3s;
        }

        input[type="text"]:focus {
            border-color: #4e73df;
            outline: none;
            box-shadow: 0 0 5px rgba(78,115,223,0.3);
        }

        button {
            width: 100%;
            padding: 11px;
            background: #4e73df;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2e59d9;
        }
    </style>
</head>
<body>

<div class="container">
<h2>Update User</h2>

<form th:action="@{/updateUser}" th:object="${user}" method="post">

    <input type="hidden" th:field="*{id}" />

    <label>Email:</label>
    <input type="text" th:field="*{email}" />

    <label>Name:</label>
    <input type="text" th:field="*{username}" />

    <label>Password:</label>
    <input type="text" th:field="*{password}" />

    <button type="submit">Update Record</button>
	

</form>
</div>

</body>
</html>
