<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f6f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 35px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .form-control {
            border-radius: 8px;
            padding: 12px;
        }

        .error-text {
            color: red;
            font-size: 0.85rem;
        }

        .btn-outline-secondary {
            border-radius: 8px;
            padding: 10px;
        }
    </style>
</head>

<body>

<div class="login-card">
    <div class="text-center mb-4">
        <h3>Login</h3>
        <p>Enter your credentials to continue</p>
    </div>

    <form th:action="@{/login}" th:object="${user}" method="post">

        <!-- Email -->
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" th:field="*{email}" class="form-control" placeholder="Enter your email" id="email">
            <div id="usernameError" class="error-text"></div>
        </div>

        <!-- Password -->
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" th:field="*{password}" class="form-control" placeholder="Enter your password" id="password">
            <div id="passwordError" class="error-text"></div>
        </div>

        <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>

    </form>

    <!-- Sign Up & Forgot Password -->
    <div class="text-center mt-3">
        <p>Don't have an account?</p>
        <a th:href="@{/signup}" class="btn btn-primary w-100 mb-2">Sign Up</a>

        <button type="button" class="btn btn-primary w-100" id="forgotPasswordBtn">
            Forgot Password?
        </button>
    </div>

    <!-- Error message -->
    <div th:if="${error}" class="text-danger text-center mt-2">
        <p th:text="${error}"></p>
    </div>
</div>

<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- Form validation -->
<script>
document.querySelector("form").addEventListener("submit", function (e) {
    let valid = true;

    const username = document.getElementById("email");
    const password = document.getElementById("password");

    document.getElementById("usernameError").innerText = "";
    document.getElementById("passwordError").innerText = "";

    if (username.value.trim() === "") {
        document.getElementById("usernameError").innerText = "Email is required";
        valid = false;
    }

    if (password.value.trim() === "") {
        document.getElementById("passwordError").innerText = "Password is required";
        valid = false;
    }

    if (!valid) e.preventDefault();
});
</script>

<!-- Forgot Password Demo -->
<!-- Forgot Password Demo -->
<script>
document.getElementById("forgotPasswordBtn").addEventListener("click", function() {
    const email = document.getElementById("email").value.trim();

    if (!email) {
        Swal.fire("Error", "Please enter email first", "error");
        return;
    }

    fetch('/forgot-password', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: `email=${encodeURIComponent(email)}`
    })
    .then(res => res.text())
    .then(password => {
        Swal.fire("New Password", `Your password: ${password}`, "info");
    });
});
</script>

<script th:inline="javascript">
    /*<![CDATA[*/
    if ([[${param.success != null}]]) {
        Swal.fire({
            title: "Success!",
            text: "Account created successfully!",
            icon: "success",
            confirmButtonText: "OK"
        });
    }
    /*]]>*/
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
